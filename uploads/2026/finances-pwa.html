    +'<div style="display:flex;gap:10px;flex-wrap:wrap">'
    +'<div class="frow" style="flex:1;min-width:120px"><label>Amount ($)</label>'+inp('ba','number',undefined,'0.00')+'</div>'
    +'<div class="frow" style="flex:1;min-width:120px"><label>Frequency</label>'+sel('bf','<option value="monthly">Monthly</option><option value="quarterly">Quarterly</option><option value="bi-yearly">Bi-Yearly</option><option value="annually">Annually</option><option value="one-off">One-off</option>')+'</div>'
    +'</div><div style="display:flex;gap:10px;flex-wrap:wrap">'
    +'<div class="frow" style="flex:1;min-width:120px"><label>Starting Month</label>'+sel('bsm',monthOpts)+'</div>'
    +'<div class="frow" style="flex:1;min-width:120px"><label>Starting Year</label>'+inp('bsy','number',YEAR)+'</div>'
    +'</div><div style="display:flex;gap:10px;flex-wrap:wrap">'
    +'<div class="frow" style="flex:1;min-width:120px"><label>End Month (opt)</label>'+sel('bem','<option value="">No end</option>'+monthOpts)+'</div>'
    +'<div class="frow" style="flex:1;min-width:120px"><label>End Year (opt)</label>'+inp('bey','number',undefined,'e.g. 2026')+'</div>'
    +'</div>'
    +'<div class="frow"><label style="display:flex;align-items:center;gap:6px;cursor:pointer;white-space:normal"><input type="checkbox" id="bsp"> Spread evenly across months</label></div>'
    +'<div class="modal-footer"><button class="btn" onclick="closeModal();renderBudget()">Done</button><button class="btn btn-p" onclick="doAddBudget()">Add Rule</button></div>');
}
async function deleteBudget(id){
  await api('DELETE','/api/budgets/'+id);DATA.budgets=DATA.budgets.filter(b=>b.id!==id);renderManageBudgetsModal();
}
async function doAddBudget(){
  const catId=document.getElementById('bc').value;
  const amount=parseFloat(document.getElementById('ba').value)||0;
  if(!catId||amount<=0){alert('Select a category and enter an amount.');return;}
  const b={categoryId:catId,amount,frequency:document.getElementById('bf').value,
    startMonth:parseInt(document.getElementById('bsm').value),startYear:parseInt(document.getElementById('bsy').value)||YEAR,
    endMonth:parseInt(document.getElementById('bem').value)||null,endYear:parseInt(document.getElementById('bey').value)||null,
    spread:document.getElementById('bsp').checked};
  const existing=DATA.budgets.find(x=>x.categoryId===b.categoryId&&x.frequency===b.frequency&&x.startMonth===b.startMonth&&x.startYear===b.startYear);
  if(existing){existing.amount=b.amount;existing.endMonth=b.endMonth;existing.endYear=b.endYear;existing.spread=b.spread;await api('PUT','/api/budgets/'+existing.id,existing);}
  else{const nb=await api('POST','/api/budgets',b)}
  renderManageBudgetsModal();
}

// ══════════════════════════════════════════════════════════
// MANAGE CATEGORIES (unchanged)
// ══════════════════════════════════════════════════════════
function buildCatRowsHTML(){
  return DATA.categories.map(function(c){
    const kaOpts=DATA.keyAreas.map(function(k){return '<option value="'+k+'"'+(k===c.keyArea?' selected':'')+'>'+k+'</option>';}).join('');
    const safe=c.name.replace(/&/g,'&amp;').replace(/"/g,'&quot;');
    return '<div style="display:grid;grid-template-columns:1fr 150px 30px;gap:6px;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)">'
      +'<input value="'+safe+'" style="width:100%;font-size:12px;background:var(--bg3);border:1px solid var(--border);border-radius:5px;color:var(--text);padding:4px 7px;" onblur="renameCat(\''+c.id+'\',this.value)">'
      +'<select class="tsel" style="font-size:11px" onchange="moveCatKA(\''+c.id+'\',this.value)">'+kaOpts+'</select>'
      +'<button class="btn btn-sm btn-danger" onclick="deleteCategory(\''+c.id+'\')">✕</button>'
      +'</div>';
  }).join('');
}
function manageCategories(){
  const kaOpts=DATA.keyAreas.map(k=>'<option value="'+k+'">'+k+'</option>').join('');
  const inp='<input id="ncn" placeholder="Category name" style="width:100%;font-family:\'Inter var\',Inter,sans-serif;font-size:13px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);padding:7px 10px;">';
  const sel='<select id="ncka" style="width:100%;font-family:\'Inter var\',Inter,sans-serif;font-size:13px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);padding:7px 10px;">'+kaOpts+'</select>';
  openModal('<h3>Manage Categories</h3>'
    +'<div style="margin-bottom:14px;padding-bottom:12px;border-bottom:2px solid var(--border)">'
    +'<div style="font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Add New Category</div>'
    +'<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end">'
    +'<div style="flex:1;min-width:130px">'+inp+'</div>'
    +'<div style="flex:1;min-width:130px">'+sel+'</div>'
    +'<button class="btn btn-p" onclick="doAddCategory()">Add</button>'
    +'</div></div>'
    +'<div style="display:grid;grid-template-columns:1fr 150px 30px;gap:6px;padding:4px 0;font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--border);margin-bottom:4px"><div>Name (edit to rename)</div><div>Key Area</div><div></div></div>'
    +'<div style="max-height:320px;overflow-y:auto"><div id="catRows">'+buildCatRowsHTML()+'</div></div>'
    +'<div class="modal-footer"><button class="btn btn-p" onclick="closeModal();renderAll()">Done</button></div>');
}
async function renameCat(id,newName){
  newName=newName.trim();const cat=DATA.categories.find(c=>c.id===id);
  if(!cat||!newName||newName===cat.name) return;
  cat.name=newName;await api('PUT','/api/categories/'+id,{name:newName});
}
async function doAddCategory(){
  const name=document.getElementById('ncn').value.trim();const keyArea=document.getElementById('ncka').value;
  if(!name){document.getElementById('ncn').focus();return;}
  const c=await api('POST','/api/categories',{name,keyArea});
  document.getElementById('ncn').value='';document.getElementById('catRows').innerHTML=buildCatRowsHTML();
}
async function moveCatKA(id,keyArea){const cat=DATA.categories.find(c=>c.id===id);if(!cat)return;cat.keyArea=keyArea;await api('PUT','/api/categories/'+id,{keyArea});}
function editCategory(id){
  const cat=DATA.categories.find(c=>c.id===id);if(!cat) return;
  const kaOpts=DATA.keyAreas.map(k=>'<option value="'+k+'"'+(k===cat.keyArea?' selected':'')+'>'+k+'</option>').join('');
  openModal('<h3>Edit Category</h3>'
    +'<div class="frow"><label>Name</label><input id="ecn" value="'+cat.name.replace(/"/g,'&quot;')+'"></div>'
    +'<div class="frow"><label>Key Area</label><select id="ecka">'+kaOpts+'</select></div>'
    +'<div class="modal-footer"><button class="btn btn-danger" onclick="deleteCategory(\''+id+'\')">Delete</button><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-p" onclick="doEditCat(\''+id+'\')">Save</button></div>');
}
async function doEditCat(id){
  const name=document.getElementById('ecn').value.trim();const keyArea=document.getElementById('ecka').value;
  const u=await api('PUT','/api/categories/'+id,{name,keyArea});
  const idx=DATA.categories.findIndex(c=>c.id===id);if(idx>=0)DATA.categories[idx]=u;
  closeModal();renderAll();
}
async function deleteCategory(id){
  if(!confirm('Delete this category? Transactions will become uncategorised.')) return;
  await api('DELETE','/api/categories/'+id);
  DATA.categories=DATA.categories.filter(c=>c.id!==id);
  DATA.transactions.forEach(t=>{if(t.categoryId===id)t.categoryId=null;});
  closeModal();renderAll();
}

// ══════════════════════════════════════════════════════════
// CREDIT CARD (unchanged)
// ══════════════════════════════════════════════════════════
function renderCreditCard(){
  const pg=document.getElementById('pg-creditcard');
  const closeDay=DATA.settings?.statementCloseDay||19;
  const today=new Date();
  const cycleStart=new Date(today.getMonth()===0?today.getFullYear()-1:today.getFullYear(),today.getMonth()===0?11:today.getMonth()-1,closeDay+1);
  const cycleEnd=new Date(today.getFullYear(),today.getMonth(),closeDay);
  const cycleTxs=DATA.transactions.filter(t=>t.accountType==='visa'&&!t.isBusiness&&!t.isTransfer&&t.amount<0&&new Date(t.date)>=cycleStart&&new Date(t.date)<=cycleEnd);
  const cycleTotal=cycleTxs.reduce((s,t)=>s+Math.abs(t.amount),0);
  const byCat={};cycleTxs.forEach(t=>{const n=t.categoryId?catName(t.categoryId):'Uncategorised';byCat[n]=(byCat[n]||0)+Math.abs(t.amount);});
  const catRows=Object.entries(byCat).sort((a,b)=>b[1]-a[1]);
  const fmtDate=d=>d.toLocaleDateString('en-CA',{month:'short',day:'numeric'});
  const daysLeft=Math.max(0,Math.ceil((cycleEnd-today)/86400000));
  pg.innerHTML='<div class="container"><div class="pg-title">Credit Card</div>'
    +'<div class="card"><div class="card-hdr"><span class="ct">RBC Credit Card</span><span class="cm">Closes '+closeDay+'th each month</span></div>'
    +'<div class="tiles tiles-4" style="margin-bottom:16px">'
    +'<div class="tile"><div class="tile-title">Current Cycle</div><div class="tile-label">Balance</div><div class="tile-value'+(cycleTotal>0?' neg':'')+'">'+( cycleTotal?fmt(cycleTotal):'—')+'</div><div class="tile-sub">'+fmtDate(cycleStart)+' – '+fmtDate(cycleEnd)+'</div></div>'
    +'<div class="tile"><div class="tile-title">Statement Closes</div><div class="tile-label">Date</div><div class="tile-value" style="font-size:16px">'+fmtDate(cycleEnd)+'</div><div class="tile-sub">'+daysLeft+' days remaining</div></div>'
    +'<div class="tile"><div class="tile-title">Transactions</div><div class="tile-label">This Cycle</div><div class="tile-value">'+cycleTxs.length+'</div></div>'
    +'<div class="tile"><div class="tile-title">Status</div><div class="tile-label">Data</div><div class="tile-value" style="font-size:16px">'+(cycleTxs.length?'✓':'—')+'</div><div class="tile-sub">'+(cycleTxs.length?'Cycle covered':'Import Visa CSV')+'</div></div>'
    +'</div>'
    +(catRows.length?'<div class="ct" style="margin-bottom:10px">This Cycle by Category</div>'
      +'<div style="display:grid;grid-template-columns:1fr 100px;gap:6px;padding:4px 0;font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--border);margin-bottom:4px"><div>Category</div><div style="text-align:right">Amount</div></div>'
      +catRows.map(([c,a])=>'<div class="cc-row"><div>'+c+'</div><div class="tamt wd">('+fmt(a)+')</div></div>').join('')
      +'<div class="cc-row" style="font-weight:600;border-top:2px solid var(--border)"><div>Total</div><div class="tamt wd" style="color:var(--red)">('+fmt(cycleTotal)+')</div></div>'
    :'<div class="empty"><h3>No data</h3><p>Import your Visa CSV in the Transactions page.</p></div>')
    +'</div></div>';
}

// ══════════════════════════════════════════════════════════
// BUSINESS (unchanged)
// ══════════════════════════════════════════════════════════
function renderBusiness(){
  const pg=document.getElementById('pg-business');
  const biz=DATA.transactions.filter(t=>t.isBusiness&&t.year===YEAR);
  const exp=biz.filter(t=>t.amount<0).reduce((s,t)=>s+Math.abs(t.amount),0);
  const inc=biz.filter(t=>t.amount>0).reduce((s,t)=>s+t.amount,0);
  pg.innerHTML='<div class="container"><div class="pg-title">Business</div><div class="card">'
    +'<div class="card-hdr"><span class="ct">Business Transactions — '+YEAR+'</span><span class="cm">excluded from all budgets &amp; charts</span></div>'
    +'<div class="biz-t">'
    +'<div class="biztile exp"><span class="btl">Expenses '+YEAR+'</span><span class="btv">('+fmt(exp)+')</span></div>'
    +'<div class="biztile inc"><span class="btl">Income '+YEAR+'</span><span class="btv">'+fmt(inc)+'</span></div>'
    +'</div>'
    +(biz.length
      ?'<div class="tx-hd" style="grid-template-columns:72px 1fr 80px 100px 80px 80px"><div>Date</div><div>Description</div><div style="text-align:right">Amount</div><div>Category</div><div>Type</div><div>Paid</div></div>'
        +biz.sort((a,b)=>b.date.localeCompare(a.date)).map(tx=>{
          const wd=tx.amount<0,amt=wd?'('+fmt(Math.abs(tx.amount))+')':fmt(tx.amount);
          const paid=tx.bizPaid||false;
          return '<div class="biz-tx-row" style="'+(paid?'opacity:.38;':'')+'padding:10px;border-bottom:1px solid var(--border);display:grid;grid-template-columns:72px 1fr 80px 100px 80px 80px;gap:8px;align-items:center;font-size:12px">'
            +'<div class="tdate">'+tx.date.slice(5).replace('-','/')+'</div>'
            +'<div class="tdesc">'+tx.description+'</div>'
            +'<div class="tamt '+(wd?'wd':'dep')+'">'+amt+'</div>'
            +'<div><span class="badge bb">'+catName(tx.categoryId)+'</span></div>'
            +'<div><span class="badge '+(wd?'by':'bb')+'">'+(wd?'Expense':'Income')+'</span></div>'
            +'<div><label class="tflag" style="accent-color:var(--green)"><input type="checkbox" '+(paid?'checked':'')+' onchange="toggleBizPaid(\''+tx.id+'\',this.checked)"> Paid</label></div>'
            +'</div>';
        }).join('')
      :'<div class="empty"><h3>No business transactions for '+YEAR+'</h3><p>Flag transactions as Business in the Transactions page.</p></div>')
    +'</div></div>';
}
async function toggleBizPaid(id,paid){
  const tx=DATA.transactions.find(t=>t.id===id);if(!tx)return;
  tx.bizPaid=paid;await api('PUT','/api/transactions/'+id,{bizPaid:paid});renderBusiness();
}

  navigator.serviceWorker.register('./sw.js').then(()=>{

      caches.open('finances-v4').then(cache=>{
        cache.match(location.href).then(hit=>{
          if(!hit) cache.add(location.href).catch(()=>{});
