<style>
:root {
  --bg:#0d0d0d;--bg2:#141414;--bg3:#1c1c1c;--border:#2a2a2a;
  --text:#f0f0f0;--text2:#999;--text3:#666;
  --blue:#1A8CFF;--blue-dim:rgba(26,140,255,.1);
  --red:#e05c5c;--red-dim:rgba(224,92,92,.1);
  --green:#15BDEC;--yellow:#d4a843;--purple:#8877cc;
  --r:10px;--rs:8px;--gap:12px;
  --bud-used:#1e3a5f;--bud-rem:#111e2e;
}
@media(prefers-color-scheme:light){
  :root{
    --bg:#fafafa;--bg2:#fff;--bg3:#f0f0ee;--border:#e0e0dc;
    --text:#1a1a1a;--text2:#555;--text3:#888;
    --blue-dim:rgba(26,140,255,.08);--red-dim:rgba(224,92,92,.08);
    --bud-used:#b3d4ff;--bud-rem:#e0eeff;
  }
}
*{margin:0;padding:0;box-sizing:border-box;}
html{-webkit-text-size-adjust:100%;}
body{font-family:'Inter var',Inter,sans-serif;background:var(--bg);color:var(--text);
  min-height:100vh;overflow-x:hidden;font-size:14px;line-height:1.5;
  font-feature-settings:'liga' 1,'calt' 1;}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:100;background:var(--bg2);border-bottom:1px solid var(--border);
  height:52px;display:flex;align-items:stretch;padding:0 20px;gap:0;}
.menu-btn{display:none;background:none;border:none;color:var(--text2);cursor:pointer;
  padding:6px 10px 6px 0;flex-direction:column;gap:4px;flex-shrink:0;align-items:center;justify-content:center;}
.menu-btn span{display:block;width:16px;height:1px;background:currentColor;}
.desktop-nav{display:flex;align-items:stretch;flex:1;}
.nav-item{display:flex;align-items:center;padding:0 16px;cursor:pointer;font-size:13px;
  color:var(--text3);border-bottom:3px solid transparent;transition:color .15s;
  white-space:nowrap;position:relative;top:1px;}
.nav-item:hover{color:var(--text2);}
.nav-item.on{color:var(--text);border-bottom-color:var(--green);}
.topbar-right{display:flex;align-items:center;gap:8px;margin-left:auto;}
.yr-sel{font-family:'Inter var',Inter,sans-serif;font-size:11px;background:var(--bg3);
  border:1px solid var(--border);border-radius:var(--rs);color:var(--text2);
  padding:4px 8px;cursor:pointer;height:28px;}

/* MOBILE MENU */
.menu-ov{display:none;position:fixed;inset:0;z-index:200;}
.menu-ov.open{display:block;}
.menu-back{position:absolute;inset:0;background:rgba(0,0,0,.6);}
.menu-panel{position:absolute;top:52px;left:0;width:220px;background:var(--bg2);
  border-right:1px solid var(--border);border-bottom:1px solid var(--border);
  border-radius:0 0 var(--r) 0;padding:8px;}
.mi{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:var(--rs);
  cursor:pointer;font-size:13px;color:var(--text2);transition:all .15s;}
.mi:hover{background:var(--bg3);color:var(--text);}
.mi.on{background:var(--blue-dim);color:var(--green);}
.mi-dot{width:5px;height:5px;border-radius:50%;background:var(--border);flex-shrink:0;}
.mi.on .mi-dot{background:var(--green);}
.dots{display:none;justify-content:center;align-items:center;gap:6px;padding:8px 0;}
.dot{width:5px;height:5px;border-radius:50%;background:var(--text3);cursor:pointer;transition:all .2s;}
.dot.on{background:var(--green);width:14px;border-radius:2px;}

/* LAYOUT */
.container{max-width:1400px;margin:0 auto;padding:var(--gap);}
.page{display:none;}.page.on{display:block;}
.pg-title{font-size:24px;font-weight:600;color:var(--text);padding:14px 0 12px;letter-spacing:-.02em;}

/* CARD */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);
  padding:18px;margin-bottom:var(--gap);}
.card-hdr{display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px;gap:8px;flex-wrap:wrap;}
.ct{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;}
.cm{font-size:11px;color:var(--text3);}

/* TILES */
.tiles{display:grid;gap:var(--gap);margin-bottom:var(--gap);}
.tiles-4{grid-template-columns:repeat(4,1fr);}
.tiles-2{grid-template-columns:1fr 1fr;}
.tile{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:18px;}
.tile-title{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.1em;
  text-transform:uppercase;margin-bottom:14px;}
.tile-label{font-size:9px;font-weight:600;color:var(--text3);letter-spacing:.12em;
  text-transform:uppercase;margin-bottom:4px;margin-top:12px;}
.tile-label:first-of-type{margin-top:0;}
.tile-value{font-size:22px;font-weight:300;color:var(--text);line-height:1.1;
  font-variant-numeric:tabular-nums;}
.tile-value.pos{color:var(--green);}
.tile-value.neg{color:var(--red);}
.tile-sub{font-size:10px;color:var(--text3);margin-top:3px;}
.tile-list{margin-top:6px;}
.tile-row{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);
  padding:3px 0;border-bottom:1px solid var(--border);}
.tile-row:last-child{border-bottom:none;}
.tile-row .neg{color:var(--red);}
.tile-row .pos{color:var(--green);}

/* CHART */
.ic-outer{position:relative;}
.ic-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.ic-scroll::-webkit-scrollbar{display:none;}
.ic-wrap{display:flex;align-items:flex-end;gap:2px;height:150px;overflow:hidden;}
.ic-nav{display:none;justify-content:space-between;align-items:center;margin-top:6px;}
.ic-nav button{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);
  color:var(--text2);font-size:16px;width:32px;height:28px;cursor:pointer;display:flex;
  align-items:center;justify-content:center;flex-shrink:0;}
.ic-nav button:active{background:var(--bg2);color:var(--green);}
.ic-nav .ic-nav-label{font-size:10px;color:var(--text3);}
.mg{position:relative;flex-shrink:0;}.mg-bars{display:flex;height:150px;gap:1px;align-items:flex-end;}
.sc{border-radius:2px 2px 0 0;}.fb{opacity:.3;}
.mg-label{font-size:9px;color:var(--text3);text-align:center;margin-top:4px;line-height:1.4;}
.surp{font-size:10px;display:block;font-weight:500;}
.leg{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px;}
.li{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--text3);}
.ld{width:12px;height:3px;border-radius:1px;}

/* CATEGORY LIST */
.split{display:grid;grid-template-columns:1fr 1fr;gap:var(--gap);}
.clist{height:440px;overflow-y:auto;}
.crow{display:grid;grid-template-columns:100px 1fr 65px;gap:8px;padding:8px 10px;
  border-bottom:1px solid var(--border);cursor:pointer;align-items:center;}
.crow:hover,.crow.on{background:var(--bg3);}
.cn{font-size:12px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cbars{display:flex;flex-direction:column;gap:3px;}
.cbt{height:6px;background:var(--bg3);border-radius:2px;overflow:hidden;}
.cbf{height:100%;border-radius:2px;}
.sf{background:var(--red);}
.bbar{display:flex;height:100%;border-radius:2px;overflow:hidden;}
.bu{background:rgba(21,189,236,.35);}
.br{flex:1;background:rgba(21,189,236,.08);}
.cright{text-align:right;}
.cdol{font-size:12px;color:var(--text);font-variant-numeric:tabular-nums;}
.cpct{font-size:9px;color:var(--text3);}
.cpct.ov{color:var(--red);}
.lc-wrap{height:200px;}
.lc-svg{display:block;}
.lc-labels{display:flex;justify-content:space-between;padding:3px 36px 0 36px;margin-top:2px;}
.lc-lbl{flex:1;text-align:center;font-size:8px;color:var(--text3);}
.lc-ph{text-align:center;padding:60px 20px;color:var(--text3);font-size:12px;}

/* TRANSACTIONS */
.tx-hd{display:grid;grid-template-columns:72px 1fr 80px 120px 120px;gap:8px;
  padding:6px 10px;font-size:9px;font-weight:600;color:var(--text3);
  text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--border);}
.tx-row{display:grid;grid-template-columns:72px 1fr 80px 120px 120px;gap:8px;
  padding:10px;border-bottom:1px solid var(--border);align-items:center;font-size:12px;}
.tx-row:hover{background:var(--bg3);}
.tx-row.dim{opacity:.5;}
.tx-row.hl{background:rgba(212,168,67,.06);}
.tdate{color:var(--text3);font-size:11px;}
.tdesc{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tamt{font-variant-numeric:tabular-nums;text-align:right;}
.tamt.wd{color:var(--text2);}
.tamt.dep{color:var(--green);}
.tsel{font-family:'Inter var',Inter,sans-serif;font-size:11px;background:var(--bg3);
  border:1px solid var(--border);border-radius:var(--rs);color:var(--text);
  padding:4px 6px;width:100%;}
.tflag{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text3);cursor:pointer;}

/* BUTTONS */
.btn{font-family:'Inter var',Inter,sans-serif;font-size:11px;font-weight:500;
  background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);
  color:var(--text2);padding:6px 12px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn:hover{border-color:var(--text3);color:var(--text);}
.btn-p{background:var(--blue-dim);border-color:rgba(26,140,255,.3);color:var(--blue);}
.btn-p:hover{background:rgba(26,140,255,.2);}
.btn-danger{color:var(--red);border-color:rgba(224,92,92,.3);}
.btn-danger:hover{background:var(--red-dim);}
.btn-sm{font-size:10px;padding:4px 8px;}

/* MODAL */
.modal-wrap{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.7);
  align-items:center;justify-content:center;padding:20px;}
.modal-wrap.open{display:flex;}
.modal-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);
  padding:24px;max-width:560px;width:100%;max-height:90vh;overflow-y:auto;}
.modal-box h3{font-size:16px;font-weight:600;margin-bottom:16px;}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;padding-top:12px;border-top:1px solid var(--border);}
.frow{margin-bottom:12px;}
.frow label{display:block;font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px;}
.frow input,.frow select,.frow textarea{width:100%;font-family:'Inter var',Inter,sans-serif;font-size:13px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);padding:7px 10px;}
.notice{background:rgba(212,168,67,.1);border:1px solid rgba(212,168,67,.3);border-radius:var(--rs);padding:8px 12px;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--yellow);}

/* BADGE */
.badge{font-size:9px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;
  padding:1px 5px;border-radius:3px;margin-left:4px;vertical-align:middle;}
.bb{background:var(--blue-dim);color:var(--blue);}
.by{background:rgba(212,168,67,.12);color:var(--yellow);}

/* BUDGET TABLE */
.bwrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.btbl{width:100%;border-collapse:collapse;min-width:820px;font-size:11px;}
.btbl th{font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  color:var(--text3);padding:5px 6px;text-align:right;border-bottom:1px solid var(--border);}
.btbl th:first-child,.btbl th:nth-child(2){text-align:left;position:sticky;background:var(--bg2);z-index:1;}
.btbl th:first-child{min-width:140px;left:0;}
.btbl th:nth-child(2){min-width:80px;left:140px;}
.btbl td{padding:4px 6px;font-size:11px;color:var(--text2);text-align:right;
  border-bottom:1px solid var(--border);font-variant-numeric:tabular-nums;}
.btbl td:first-child{font-size:12px;text-align:left;color:var(--text);position:sticky;left:0;background:var(--bg2);z-index:1;}
.btbl td:nth-child(2){text-align:right;position:sticky;left:140px;background:var(--bg2);z-index:1;}
.bsec td{background:var(--bg3)!important;font-size:9px;font-weight:600;
  letter-spacing:.1em;text-transform:uppercase;color:var(--text3);padding:6px 6px;text-align:left!important;}
.bcur{background:rgba(26,140,255,.05)!important;}

// ══════════════════════════════════════════════════════════
// LOCAL STORAGE (replaces server API entirely)

const STORE_KEY='finances_data';

function loadFromStorage(){
  try{
    const raw=localStorage.getItem(STORE_KEY);
    return raw?JSON.parse(raw):null;
  }catch(e){return null;}
}

function saveToStorage(){
  try{
    localStorage.setItem(STORE_KEY,JSON.stringify(DATA));
  }catch(e){console.error('Save failed:',e);}
}

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

// Replaces all api() calls — operates on DATA in-memory then persists
function api(method,path,body){
  // All mutations happen synchronously on DATA, then save
  // Returns a Promise to maintain compatibility with async/await callers

  // GET /api/data
  if(method==='GET'&&path==='/api/data') return Promise.resolve(JSON.parse(JSON.stringify(DATA)));

  // GET /api/years
  if(method==='GET'&&path==='/api/years'){
    const years=[...new Set(DATA.transactions.map(t=>t.year))].sort((a,b)=>b-a);
    return Promise.resolve(years);
  }

  // POST /api/save
  if(method==='POST'&&path==='/api/save'){saveToStorage();return Promise.resolve({ok:true});}

  // PUT /api/settings
  if(method==='PUT'&&path==='/api/settings'){
    DATA.settings={...DATA.settings,...body};saveToStorage();return Promise.resolve(DATA.settings);
  }

  // POST /api/categories
  if(method==='POST'&&path==='/api/categories'){
    const cat={id:uid(),name:body.name,keyArea:body.keyArea};
    DATA.categories.push(cat);saveToStorage();return Promise.resolve(cat);
  }

  // PUT /api/categories/:id
  const catPut=path.match(/^\/api\/categories\/([^/]+)$/);
  if(catPut&&method==='PUT'){
    const idx=DATA.categories.findIndex(c=>c.id===catPut[1]);
    if(idx>=0){
      const oldKA=DATA.categories[idx].keyArea;
      DATA.categories[idx]={...DATA.categories[idx],...body};
      if(body.keyArea&&body.keyArea!==oldKA){
        DATA.transactions.forEach(t=>{if(t.categoryId===catPut[1])t.keyArea=body.keyArea;});
      }
    }
    saveToStorage();return Promise.resolve(DATA.categories[idx]||{});
  }
  // DELETE /api/categories/:id
  if(catPut&&method==='DELETE'){
    DATA.categories=DATA.categories.filter(c=>c.id!==catPut[1]);
    saveToStorage();return Promise.resolve({ok:true});
  }

  // POST /api/transactions (bulk import)
  if(method==='POST'&&path==='/api/transactions'){
    const incoming=Array.isArray(body.transactions)?body.transactions:[body];
    const added=[];
    incoming.forEach(tx=>{
      if(tx.isDuplicate&&!tx.forceAdd) return;
      const newTx={...tx,id:tx.id||uid()};
      delete newTx.isDuplicate;delete newTx.forceAdd;
      DATA.transactions.push(newTx);added.push(newTx);
    });
    saveToStorage();return Promise.resolve({added:added.length,transactions:added});
  }

  // PUT /api/transactions/:id
  const txMatch=path.match(/^\/api\/transactions\/([^/]+)$/);
  if(txMatch&&method==='PUT'){
    const idx=DATA.transactions.findIndex(t=>t.id===txMatch[1]);
    if(idx>=0){DATA.transactions[idx]={...DATA.transactions[idx],...body};}
    saveToStorage();return Promise.resolve(DATA.transactions[idx]||{});
  }
  if(txMatch&&method==='DELETE'){
    DATA.transactions=DATA.transactions.filter(t=>t.id!==txMatch[1]);
    saveToStorage();return Promise.resolve({ok:true});
  }

  // POST /api/budgets
  if(method==='POST'&&path==='/api/budgets'){
    const bud={id:uid(),...body};DATA.budgets.push(bud);
    saveToStorage();return Promise.resolve(bud);
  }

  // PUT/DELETE /api/budgets/:id
  const budMatch=path.match(/^\/api\/budgets\/([^/]+)$/);
  if(budMatch&&method==='PUT'){
    const idx=DATA.budgets.findIndex(b=>b.id===budMatch[1]);
    if(idx>=0)DATA.budgets[idx]={...DATA.budgets[idx],...body};
    saveToStorage();return Promise.resolve(DATA.budgets[idx]||{});
  }
  if(budMatch&&method==='DELETE'){
    DATA.budgets=DATA.budgets.filter(b=>b.id!==budMatch[1]);
    saveToStorage();return Promise.resolve({ok:true});
  }

  // POST /api/savings
  if(method==='POST'&&path==='/api/savings'){
    const acct={id:uid(),accountName:body.accountName,colour:body.colour||'blue',
      currency:body.currency||'CAD',accountType:body.accountType||'investment',
      accountNumber:body.accountNumber||'',website:body.website||'',notes:body.notes||'',
      currentValue:body.currentValue||0,monthlyPayout:body.monthlyPayout||0,entries:body.entries||[]};
    DATA.savings.push(acct);saveToStorage();return Promise.resolve(acct);
  }

  // PUT/DELETE /api/savings/:id
  const savIdMatch=path.match(/^\/api\/savings\/([^/]+)$/);
  if(savIdMatch&&method==='PUT'){
    const acct=DATA.savings.find(s=>s.id===savIdMatch[1]);
    if(acct){
      const fields=['accountName','colour','currency','accountType','accountNumber','website','notes','currentValue','monthlyPayout'];
      fields.forEach(f=>{if(body[f]!==undefined)acct[f]=body[f];});
    }
    saveToStorage();return Promise.resolve(acct||{});
  }
  if(savIdMatch&&method==='DELETE'){
    DATA.savings=DATA.savings.filter(s=>s.id!==savIdMatch[1]);
    saveToStorage();return Promise.resolve({ok:true});
  }

  // POST /api/savings/:id/entries
  const savEntMatch=path.match(/^\/api\/savings\/([^/]+)\/entries$/);
  if(savEntMatch&&method==='POST'){
    const acct=DATA.savings.find(s=>s.id===savEntMatch[1]);
    if(acct){
      const entry={id:uid(),date:new Date().toISOString().slice(0,10),added:body.added,value:body.value,note:body.note||''};
      acct.entries.push(entry);saveToStorage();return Promise.resolve(entry);
    }
    return Promise.reject(new Error('Account not found'));
  }

  // Tracker — save() call from tracker mutations
  saveToStorage();return Promise.resolve({ok:true});
}

function autoCategorise(description){
  const upper=description.toUpperCase();
  for(const{kw,cat} of KEYWORDS){
    if(upper.includes(kw.toUpperCase())){
      if(cat==='__transfer__') return{categoryId:null,isTransfer:true};
      const found=DATA.categories.find(c=>c.name===cat);
      if(found) return{categoryId:found.id,isTransfer:false};
      return{categoryId:null,isTransfer:false};
    }
  }
  return{categoryId:null,isTransfer:false};
}

function parseCSV(text){
  const lines=text.replace(/\r/g,'').split('\n').filter(l=>l.trim());
  if(lines.length<2) return[];
  const header=lines[0].replace(/^\uFEFF/,'').split(',').map(h=>h.trim().toLowerCase());
  const dateCol=header.findIndex(h=>h.includes('date'));
  const desc1Col=header.findIndex(h=>h.includes('description 1')||h==='description1');
  const desc2Col=header.findIndex(h=>h.includes('description 2')||h==='description2');
  const cadCol=header.findIndex(h=>h.includes('cad'));
  const acctCol=header.findIndex(h=>h.includes('account type')||h==='accounttype');
  if(dateCol<0||cadCol<0) return[];
  return lines.slice(1).map(line=>{
    const cols=[];let cur='',inQ=false;
    for(const ch of line){
      if(ch==='"'){inQ=!inQ;}
      else if(ch===','&&!inQ){cols.push(cur.trim());cur='';}
      else{cur+=ch;}
    }
    cols.push(cur.trim());
    const rawDate=cols[dateCol]||'';
    const desc=[cols[desc1Col]||'',cols[desc2Col]||''].filter(Boolean).join(' ').trim();
    const cadRaw=cols[cadCol]||'';
    const amount=parseFloat(cadRaw.replace(/[^0-9.\-]/g,''))||0;
    const acct=(cols[acctCol]||'').toLowerCase();
    const[m,d,y]=rawDate.split('/');
    if(!y) return null;
    const date=`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const month=parseInt(m,10);const year=parseInt(y,10);
    return{date,description:desc,amount,month,year,accountType:acct.includes('visa')?'visa':'chequing'};
  }).filter(Boolean);
}

function importCSV_client(text,filename){
  const rows=parseCSV(text);
  if(!rows.length){alert('No valid rows found in CSV.');return;}
  const monthCount={};
  rows.forEach(r=>{const k=`${r.year}-${r.month}`;monthCount[k]=(monthCount[k]||0)+1;});
  const dominantKey=Object.entries(monthCount).sort((a,b)=>b[1]-a[1])[0]?.[0];
  const[targetYear,targetMonth]=dominantKey?dominantKey.split('-').map(Number):[0,0];
  const filtered=rows.filter(r=>r.year===targetYear&&r.month===targetMonth);
  const results=filtered.map(row=>{
    const{categoryId,isTransfer}=autoCategorise(row.description);
    const isDuplicate=DATA.transactions.some(t=>
      t.date===row.date&&t.description===row.description&&Math.abs(t.amount-row.amount)<0.01
    );
    return{...row,id:uid(),categoryId,isTransfer,isBusiness:false,isDuplicate,
      source:filename||'import',confirmed:!!categoryId&&!isDuplicate};
  });
  showImportReview(results,targetYear,targetMonth);
}

function getLastSundayAt8pm(){
  const now=new Date();
  const day=now.getDay(); // 0=Sun
  const daysBack=day===0?0:day; // if today is Sun and it's past 8pm, day=0 so 0 days back
  const lastSun=new Date(now);
  lastSun.setDate(now.getDate()-daysBack);
  lastSun.setHours(20,0,0,0);
  // If today is Sunday but before 8pm, go back 7 more days
  if(now<=lastSun){lastSun.setDate(lastSun.getDate()-7);}
  return lastSun;
}

function getFreshnessInfo(){
  const exportedAt=DATA?.exportedAt;
  if(!exportedAt) return{status:'none',label:'No export date'};
  const exported=new Date(exportedAt);
  const lastDeadline=getLastSundayAt8pm();
  const isStale=exported<lastDeadline;
  const dateStr=exported.toLocaleDateString('en-CA',{month:'short',day:'numeric',year:'numeric'});
  return isStale
    ?{status:'stale',label:'⚠ Data from '+dateStr+' — may be stale'}
    :{status:'fresh',label:'✓ Current as of '+dateStr};
}

// Auto-export on Sunday at 8pm (Mac only — when app is open)
let _autoExportChecked=false;
function checkAutoExport(){
  if(_autoExportChecked) return;
  const now=new Date();
  if(now.getDay()===0&&now.getHours()===20&&now.getMinutes()<5){
    _autoExportChecked=true;
    exportBackup(true); // silent=true
  }
}

function handleWelcomeJSON(input){
  const file=input.files[0];if(!file) return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const b=JSON.parse(e.target.result);
      if(!b.version) throw new Error('Not a valid Finances backup file.');

function catName(id){return DATA.categories.find(c=>c.id===id)?.name||'—';}

function monthlySpend(categoryId,year){
  const cat=DATA.categories.find(c=>c.id===categoryId);
  const ka=cat?cat.keyArea:'';
  const isPayrollOnly=ka==='Incoming';
  return MONTHS.map((_,mi)=>{
    const direct=DATA.transactions.filter(t=>
      t.year===year&&t.month===mi+1&&t.categoryId===categoryId&&
      !t.isBusiness&&!t.isTransfer&&!(t.splitMonths>1)
    );
    const spread=DATA.transactions.filter(t=>{
      if(t.categoryId!==categoryId||t.isBusiness||t.isTransfer) return false;
      if(!(t.splitMonths>1)) return false;
      const startOffset=(t.year-year)*12+(t.month-1);
      const endOffset=startOffset+t.splitMonths-1;
      return mi>=startOffset&&mi<=endOffset;
    });
    if(isPayrollOnly){
      const dAmt=direct.filter(t=>t.amount>0).reduce((s,t)=>s+t.amount,0);
      const sAmt=spread.filter(t=>t.amount>0).reduce((s,t)=>s+t.amount/t.splitMonths,0);
      return dAmt+sAmt;
    } else {
      const dAmt=direct.filter(t=>t.amount<0).reduce((s,t)=>s+Math.abs(t.amount),0);
      const sAmt=spread.filter(t=>t.amount<0).reduce((s,t)=>s+Math.abs(t.amount)/t.splitMonths,0);
      return dAmt+sAmt;
    }
  });
}

function monthlyIncome(year){
  const cats=DATA.categories.filter(c=>c.name==='Payroll');
  return MONTHS.map((_,mi)=>cats.reduce((s,c)=>s+DATA.transactions
    .filter(t=>t.year===year&&t.month===mi+1&&t.categoryId===c.id&&!t.isBusiness&&!t.isTransfer&&t.amount>0)
    .reduce((a,t)=>a+t.amount,0),0));
}

function monthlyTransfers(year){
  const cats=DATA.categories.filter(c=>c.name==='International Transfer');
  if(!cats.length) return new Array(12).fill(0);
  return MONTHS.map((_,mi)=>DATA.transactions
    .filter(t=>t.year===year&&t.month===mi+1&&!t.isBusiness&&!t.isTransfer&&
      cats.some(c=>c.id===t.categoryId)&&t.amount>0)
    .reduce((s,t)=>s+t.amount,0));
}

function monthlyOut(year){
  const outCats=DATA.categories.filter(c=>c.keyArea!=='Incoming');
  return MONTHS.map((_,mi)=>outCats.reduce((s,c)=>s+(monthlySpend(c.id,year)[mi]||0),0));
}

function budgetFor(catId,month,year){
  let total=0;
  DATA.budgets.filter(b=>b.categoryId===catId).forEach(b=>{
    if(b.frequency==='individual'){if(b.startMonth===month&&b.startYear===year)total+=b.amount;return;}
    const sm=b.startMonth||1,sy=b.startYear||year,em=b.endMonth||12,ey=b.endYear||9999;
    if(year<sy||year>ey) return;
    if(year===sy&&month<sm) return;
    if(year===ey&&month>em) return;
    if(b.frequency==='monthly') total+=b.amount;
    else if(b.frequency==='quarterly'){const d=(year-sy)*12+(month-sm);if(d>=0&&d%3===0)total+=b.amount;}
    else if(b.frequency==='bi-yearly'){const d=(year-sy)*12+(month-sm);if(d>=0&&d%6===0)total+=b.amount;}
    else if(b.frequency==='annually'){if(month===sm)total+=b.amount;}
    else if(b.frequency==='one-off'){if(month===sm&&year===sy)total+=b.amount;}
  });
  return total;
}
function annualBudget(catId,year){let t=0;for(let m=1;m<=12;m++)t+=budgetFor(catId,m,year);return t;}

function fmt(n){
  if(n===0||n==null) return '—';
  return '$'+Math.abs(n).toLocaleString('en-CA',{minimumFractionDigits:0,maximumFractionDigits:0});
}

function toast(msg,duration=3000){
  const n=document.createElement('div');n.className='toast';n.textContent=msg;
  document.body.appendChild(n);setTimeout(()=>n.remove(),duration);
}

    +'</div>'
    +'</div>';

  const maxV=Math.max(...MONTHS.map((_,i)=>(earnedInc[i]||0)+(trf[i]||0)),...out,1);
  document.getElementById('ic').innerHTML=MONTHS.map((m,i)=>{
    const eH=((earnedInc[i]||0)/maxV)*150,tH=((trf[i]||0)/maxV)*150,oH=((out[i]||0)/maxV)*150;
    const fut=YEAR===new Date().getFullYear()&&i>CUR_MONTH;
    const surp=(earnedInc[i]||0)-(out[i]||0);
    const surpStr=surp===0?'':(surp>0?'+'+fmt(surp):'–'+fmt(Math.abs(surp)));

    const hasData=(earnedInc[i]||0)>0||(trf[i]||0)>0||(out[i]||0)>0;
    const tipData=hasData?JSON.stringify({
      m,
      inc:fmt(earnedInc[i]||0),
      trf:(trf[i]||0)>0?fmt(trf[i]):null,
      out:fmt(out[i]||0),
      net:surpStr,
      netCol:surp<0?'var(--red)':'var(--green)'
    }).replace(/"/g,'&quot;'):'';
    return '<div class="mg" style="flex:1;display:flex;flex-direction:column;align-items:center;position:relative;cursor:crosshair"'
      +(hasData
        ?' data-tip="'+tipData+'" onmouseenter="showIcTip(event,this)" onmousemove="moveIcTip(event)" onmouseleave="hideIcTip()"'
        :'')+'>'
      +'<div class="mg-bars" style="align-items:flex-end;gap:1px;width:100%">'

      +'</div>'
      +'<div class="'+(fut?'fb':'')+'" style="height:'+oH+'px;flex:1;background:var(--red);opacity:.85;border-radius:2px 2px 0 0"></div>'

  // Auto-scroll chart to current month on mobile

    const pct=c.annBud>0?Math.round(c.spent/c.annBud*100):0;
    const payPct=ytdEarned>0?(c.spent/ytdEarned*100).toFixed(1):0;
    const spW=(c.spent/maxS*100).toFixed(1);
    const usedP=c.annBud>0?Math.min(100,c.spent/c.annBud*100).toFixed(1):0;
    const toDateBud=c.budLine.slice(0,ytdM).reduce((a,b)=>a+b,0);
    const isOv=c.spent>toDateBud&&toDateBud>0;
    return '<div class="crow" onclick="selCat('+i+')" id="cr-'+i+'">'
      +'<div class="cn" title="'+c.name+'">'+c.name+'</div>'
      +'<div class="cbars">'
      +'<div class="cbt"><div class="cbf sf" style="width:'+spW+'%"></div></div>'
      +'<div class="cbt"><div class="bbar"><div class="bu" style="width:'+usedP+'%"></div><div class="br"></div></div></div>'
      +'</div>'
      +'<div class="cright"><div class="cdol">'+fmt(c.spent)+'</div>'
      +'<div class="cpct '+(isOv?'ov':'')+'">'+pct+'% bud</div>'
      +'<div style="font-size:9px;color:var(--text3)">'+payPct+'% pay</div>'
      +'</div></div>';
  }).join('');

  renderTracker();
}

// Mobile chart scroll navigation
function showIcTip(e,el){
  let t=document.getElementById('ic-tip-global');
  if(!t){
    t=document.createElement('div');t.id='ic-tip-global';
    t.style.cssText='position:fixed;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-size:11px;white-space:nowrap;z-index:9999;box-shadow:0 2px 12px rgba(0,0,0,.4);pointer-events:none;display:none;';
    document.body.appendChild(t);
  }
  try{
    const d=JSON.parse(el.dataset.tip.replace(/&quot;/g,'"'));
    t.innerHTML='<div style="font-size:9px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">'+d.m+'</div>'
      +'<div style="display:flex;justify-content:space-between;gap:14px;margin-bottom:2px"><span style="color:var(--text3)">Income</span><span style="color:var(--green)">'+d.inc+'</span></div>'
      +(d.trf?'<div style="display:flex;justify-content:space-between;gap:14px;margin-bottom:2px"><span style="color:var(--text3)">Transfers</span><span style="color:var(--text2)">'+d.trf+'</span></div>':'')
      +'<div style="display:flex;justify-content:space-between;gap:14px;margin-bottom:4px"><span style="color:var(--text3)">Spending</span><span style="color:var(--red)">('+d.out+')</span></div>'
      +'<div style="display:flex;justify-content:space-between;gap:14px;border-top:1px solid var(--border);padding-top:4px"><span style="color:var(--text3)">Net</span><span style="color:'+d.netCol+'">'+d.net+'</span></div>';
    t.style.display='block';
    moveIcTip(e);
  }catch(err){}
}
function moveIcTip(e){
  const t=document.getElementById('ic-tip-global');if(!t||t.style.display==='none')return;
  const tw=t.offsetWidth||180;
  let left=e.clientX+14;
  if(left+tw>window.innerWidth-8) left=e.clientX-tw-14;
  t.style.left=left+'px';
  t.style.top=Math.max(8,e.clientY-90)+'px';
}
function hideIcTip(){const t=document.getElementById('ic-tip-global');if(t)t.style.display='none';}

function updateIcNavLabel(){
  const scroller=document.getElementById('icScroll');
  const label=document.getElementById('icNavLabel');
  if(!scroller||!label) return;
  const colW=56;
  const leftmost=Math.min(11,Math.round(scroller.scrollLeft/colW));
  const visible=Math.floor(scroller.clientWidth/colW);
  const rightmost=Math.min(11,leftmost+visible-1);
  label.textContent=MONTHS[leftmost]+(rightmost>leftmost?' – '+MONTHS[rightmost]:'');
}
function icScroll(dir){
  const scroller=document.getElementById('icScroll');
  if(!scroller) return;
  scroller.scrollBy({left:dir*56,behavior:'smooth'});
  setTimeout(updateIcNavLabel,350);
}

function renderTracker(){
  const items=DATA.tracker||[];
  const body=document.getElementById('trackerBody');
  if(!items.length){body.innerHTML='<div class="empty" style="padding:20px"><p>No items tracked. Add your first household item above.</p></div>';return;}
  const now=Date.now();
  const cols='1fr 70px 65px 65px 80px 1fr 90px';
  let html='<div class="tracker-row tracker-hd" style="grid-template-columns:'+cols+'">'
    +'<div>Item</div><div>Cost</div><div>Units</div><div>Per Unit</div><div>Purchased</div><div>Days elapsed · Est. remaining</div><div></div></div>';
  items.forEach((item,i)=>{
    if(!item.entries){
      item.entries=[{cost:item.cost||0,units:item.units||1,date:item.date||new Date().toISOString().slice(0,10)}];
      delete item.cost;delete item.units;delete item.date;
    }
    const sorted=[...item.entries].sort((a,b)=>b.date.localeCompare(a.date));
    const latest=sorted[0];const prev=sorted.slice(1);
    const daysSince=Math.floor((now-new Date(latest.date).getTime())/86400000);
    const rate=daysSince>0?latest.units/daysSince:0;
    const daysLeft=rate>0?Math.round((latest.units-daysSince*rate)/rate):0;
    const urgCol=daysLeft>=0&&daysLeft<7?'var(--red)':'var(--text2)';
    const costPerUnit=latest.units>0?(latest.cost/latest.units):0;
    const detail=item.detail?'<div style="font-size:10px;color:var(--text3)">'+item.detail+'</div>':'';
    html+='<div class="tracker-row" style="grid-template-columns:'+cols+'">'
      +'<div><strong>'+item.name+'</strong>'+detail+'</div>'
      +'<div style="color:var(--text2)"><span style="color:var(--text3);font-size:10px">Cost: </span>'+fmt(latest.cost)+'</div>'
      +'<div style="color:var(--text2)"><span style="color:var(--text3);font-size:10px">Units: </span>'+latest.units+'</div>'
      +'<div style="color:var(--text2)"><span style="color:var(--text3);font-size:10px">$/u: </span>'+(costPerUnit>0?'$'+costPerUnit.toFixed(2):'—')+'</div>'
      +'<div style="color:var(--text3);white-space:nowrap">'+latest.date+'</div>'
      +'<div><span style="color:var(--text2)">'+daysSince+'d elapsed</span>'
      +' · <span style="color:'+urgCol+'">'+Math.max(0,daysLeft)+'d left</span></div>'
      +'<div style="display:flex;flex-direction:row;gap:4px;align-items:center;flex-wrap:nowrap">'
      +'<button class="btn btn-sm" onclick="editTrackerItem('+i+')" style="font-size:9px;white-space:nowrap">✎</button>'
      +'<button class="btn btn-sm btn-p" onclick="lapTrackerItem('+i+')" style="font-size:9px;white-space:nowrap">⟳ Lap</button>'
      +'<button class="btn btn-sm btn-danger" onclick="deleteTrackerItem('+i+')" style="white-space:nowrap">✕</button>'
      +'</div>'
      +'</div>';
    if(prev.length){
      html+='<div id="th-prev-'+i+'" style="grid-column:1/-1;padding:0 10px">'
        +'<div style="display:grid;grid-template-columns:'+cols+'">'
        +'<span class="btx-expand" style="color:var(--blue);cursor:pointer;font-size:9px;text-transform:uppercase;letter-spacing:.08em;padding:4px 0;display:block" onclick="toggleTrackerHistory('+i+')">↓ '+prev.length+' previous purchase'+(prev.length!==1?'s':'')+'</span>'
        +'</div>'
        +'<div id="th-hist-'+i+'" style="display:none">'
        +prev.map(e=>{
          const ds=Math.floor((now-new Date(e.date).getTime())/86400000);
          const cpu=e.units>0?(e.cost/e.units):0;
          return '<div style="display:grid;grid-template-columns:'+cols+';padding:5px 0;border-top:1px solid var(--border);opacity:.45;font-size:11px">'
            +'<div>'+item.name+'</div>'
            +'<div style="color:var(--text2)">'+fmt(e.cost)+'</div>'
            +'<div style="color:var(--text2)">'+e.units+'</div>'
            +'<div style="color:var(--text2)">'+(cpu>0?'$'+cpu.toFixed(2):'—')+'</div>'
            +'<div style="color:var(--text3)">'+e.date+'</div>'
            +'<div style="color:var(--text3)">'+ds+'d ago</div>'
            +'<div></div>'
            +'</div>';
        }).join('')+'</div></div>';
    }
  });
  body.innerHTML=html;
}
function toggleTrackerHistory(i){
  const el=document.getElementById('th-hist-'+i);
  const btn=document.getElementById('th-prev-'+i)?.querySelector('.btx-expand');
  if(!el) return;
  const open=el.style.display==='none';
  el.style.display=open?'':'none';
  if(btn) btn.textContent=(open?'↑':'↓')+' '+btn.textContent.slice(2);
}
function addTrackerItem(){
  openModal('<h3>Add Household Item</h3>'
    +'<div class="frow"><label>Item Name</label><input id="ti-name" placeholder="e.g. Soap bars"></div>'
    +'<div class="frow"><label>Details / Volume (optional)</label><input id="ti-detail" placeholder="e.g. 500ml, pack of 6"></div>'
    +'<div class="frow"><label>Cost ($)</label><input id="ti-cost" type="number" step="0.01" placeholder="0.00"></div>'
    +'<div class="frow"><label>Number of Units</label><input id="ti-units" type="number" placeholder="e.g. 16"></div>'
    +'<div class="modal-footer"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-p" onclick="doAddTrackerItem()">Add</button></div>');

}
async function doAddTrackerItem(){
  const name=document.getElementById('ti-name').value.trim();
  const detail=document.getElementById('ti-detail').value.trim();
  const cost=parseFloat(document.getElementById('ti-cost').value)||0;
  const units=parseInt(document.getElementById('ti-units').value)||1;
  if(!name) return;
  if(!DATA.tracker) DATA.tracker=[];

function editTrackerItem(i){
  const item=DATA.tracker[i];if(!item) return;
  const latest=[...item.entries].sort((a,b)=>b.date.localeCompare(a.date))[0];
  openModal('<h3>Edit — '+item.name+'</h3>'
    +'<div class="frow"><label>Item Name</label><input id="ei-name" value="'+item.name.replace(/"/g,'&quot;')+'"></div>'
    +'<div class="frow"><label>Details / Volume</label><input id="ei-detail" value="'+(item.detail||'').replace(/"/g,'&quot;')+'" placeholder="e.g. 500ml, pack of 6"></div>'
    +'<div class="frow"><label>Date Purchased</label><input id="ei-date" type="date" value="'+(latest?.date||new Date().toISOString().slice(0,10))+'"></div>'
    +'<div class="modal-footer"><button class="btn btn-danger" onclick="deleteTrackerItem('+i+')">Delete</button><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-p" onclick="doEditTrackerItem('+i+')">Save</button></div>');
  setTimeout(()=>document.getElementById('ei-name')?.focus(),50);
}
async function doEditTrackerItem(i){
  const item=DATA.tracker[i];if(!item) return;
  const name=document.getElementById('ei-name').value.trim();
  const detail=document.getElementById('ei-detail').value.trim();
  const date=document.getElementById('ei-date').value;
  if(!name) return;
  item.name=name;item.detail=detail;
  // Update the date on the most recent entry
  const latest=[...item.entries].sort((a,b)=>b.date.localeCompare(a.date))[0];
  if(latest&&date) latest.date=date;
  await save();closeModal();renderTracker();
}
function lapTrackerItem(i){
  const item=DATA.tracker[i];if(!item) return;
  const latest=item.entries?[...item.entries].sort((a,b)=>b.date.localeCompare(a.date))[0]:{cost:0,units:1};
  openModal('<h3>Lap — '+item.name+'</h3>'
    +(item.detail?'<p style="font-size:12px;color:var(--text3);margin-bottom:8px">'+item.detail+'</p>':'')
    +'<p style="font-size:12px;color:var(--text3);margin-bottom:14px">Record a new purchase.</p>'
    +'<div class="frow"><label>Cost ($)</label><input id="lap-cost" type="number" step="0.01" value="'+latest.cost+'"></div>'
    +'<div class="frow"><label>Number of Units</label><input id="lap-units" type="number" value="'+latest.units+'"></div>'
    +'<div id="lap-cpu" style="font-size:11px;color:var(--text3);margin-top:-6px;margin-bottom:10px"></div>'
    +'<div class="modal-footer"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-p" onclick="doLapTrackerItem('+i+')">Confirm Purchase</button></div>');
  // Live cost-per-unit preview
  const update=()=>{
    const c=parseFloat(document.getElementById('lap-cost')?.value)||0;
    const u=parseInt(document.getElementById('lap-units')?.value)||1;
    const el=document.getElementById('lap-cpu');
    if(el) el.textContent=u>0?'Cost per unit: $'+(c/u).toFixed(2):'';
  };
  setTimeout(()=>{
    document.getElementById('lap-cost')?.addEventListener('input',update);
    document.getElementById('lap-units')?.addEventListener('input',update);
    update();
  },50);
}
async function doLapTrackerItem(i){
  const item=DATA.tracker[i];if(!item) return;
  const cost=parseFloat(document.getElementById('lap-cost').value)||0;
  const units=parseInt(document.getElementById('lap-units').value)||1;
  if(!item.entries) item.entries=[];
  item.entries.unshift({cost,units,date:new Date().toISOString().slice(0,10)});
  await save();closeModal();renderTracker();
}
async function deleteTrackerItem(i){
  if(!confirm('Delete this tracked item and all its history?')) return;
  DATA.tracker.splice(i,1);await save();closeModal();renderTracker();
}

function selCat(i){
  document.querySelectorAll('.crow').forEach(r=>r.classList.remove('on'));
  document.getElementById('cr-'+i)?.classList.add('on');
  const c=window._catTotals[i];if(!c) return;
  document.getElementById('lt').textContent=c.name;
  document.getElementById('lph').style.display='none';
  document.getElementById('lc').style.display='block';
  window._selCat=c;window._selCatIdx=i;
  drawLine(c);renderCatTxList(c,null);
}
function sigWords(desc){
  const stop=new Set(['the','and','for','from','ca','inc','ltd','at','of','by','in','on','to','a']);
  return desc.toUpperCase().split(/[\s\/\-\.\,\#\&]+/).filter(w=>w.length>2&&!stop.has(w.toLowerCase())&&!/^\d+$/.test(w));
}
function renderCatTxList(c,matchWords){
  const allTxs=DATA.transactions.filter(t=>t.categoryId===c.id&&t.year===YEAR&&!t.isBusiness&&!t.isTransfer)
    .sort((a,b)=>b.date.localeCompare(a.date));
  const txs=matchWords?allTxs.filter(t=>{const w=sigWords(t.description);return matchWords.some(mw=>w.includes(mw));}):allTxs;
  const ltxs=document.getElementById('ltxs');
  if(!allTxs.length){ltxs.innerHTML='<div style="font-size:11px;color:var(--text3);padding:8px 0">No transactions for '+YEAR+'</div>';return;}
  const lbl=matchWords?matchWords[0]:null;
  const tot=txs.filter(t=>t.amount<0).reduce((s,t)=>s+Math.abs(t.amount),0);
  let html='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">'
    +'<div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em">'
    +(lbl?'Showing "'+lbl+'" — '+txs.length+' of '+allTxs.length+' · '+fmt(tot):allTxs.length+' transactions · click to group similar')+'</div>'
    +(lbl?'<button class="btn btn-sm" onclick="selCat(window._selCatIdx)">Show all</button>':'')+'</div>';
  html+='<div style="display:grid;grid-template-columns:60px 1fr 80px;gap:6px;padding:0 0 4px;font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--border);margin-bottom:4px"><div>Date</div><div>Description</div><div style="text-align:right">Amount</div></div>';
  txs.forEach(tx=>{
    const wd=tx.amount<0,amt=wd?'('+fmt(Math.abs(tx.amount))+')':fmt(tx.amount);
    const safe=tx.description.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    html+='<div style="display:grid;grid-template-columns:60px 1fr 80px;gap:6px;padding:5px 0;border-bottom:1px solid var(--border);align-items:center;cursor:pointer" onclick="groupSimilar(\''+safe+'\')"><div style="font-size:10px;color:var(--text3)">'+tx.date.slice(5).replace('-','/')+'</div><div style="font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+tx.description+'">'+tx.description.slice(0,38)+'</div><div style="font-size:11px;text-align:right;color:'+(wd?'var(--text2)':'var(--green)')+'">'+amt+'</div></div>';
  });
  ltxs.innerHTML=html;
}
function groupSimilar(desc){
  const c=window._selCat;if(!c) return;
  const words=sigWords(desc).slice(0,2);if(!words.length) return;
  const allTxs=DATA.transactions.filter(t=>t.categoryId===c.id&&t.year===YEAR&&!t.isBusiness&&!t.isTransfer);
  const filtered=allTxs.filter(t=>sigWords(t.description).some(w=>words.includes(w)));
  const fm=MONTHS.map((_,mi)=>filtered.filter(t=>t.month===mi+1).reduce((s,t)=>s+Math.abs(t.amount),0));
  drawLine(Object.assign({},c,{monthly:fm,spent:fm.reduce((a,b)=>a+b,0)}),words[0]);
  renderCatTxList(c,words);
}
function drawLine(c,filterLabel){
  const svg=document.getElementById('lsvg');
  const W=600,H=200,pT=16,pB=10,pL=36,pR=8;
  const iW=W-pL-pR,iH=H-pT-pB;
  const mx=Math.max(...c.monthly,...c.budLine,1);
  const px=i=>pL+i*(iW/11),py=v=>pT+iH-(v/mx)*iH;
  const grid=[.25,.5,.75,1].map(f=>{const y=py(mx*f);return '<line x1="'+pL+'" y1="'+y+'" x2="'+(W-pR)+'" y2="'+y+'" stroke="var(--border)" stroke-width="0.5"/><text x="'+(pL-2)+'" y="'+(y+3)+'" font-size="8" fill="var(--text3)" text-anchor="end">$'+Math.round(mx*f)+'</text>';}).join('');
  const lastAct=c.monthly.reduce((a,v,i)=>v>0?i:a,-1);
  const actPts=c.monthly.slice(0,lastAct+1);
  const actPath=actPts.map((v,i)=>(i===0?'M':'L')+px(i)+','+py(v)).join(' ');
  const budS=c.budLine.slice(0,CUR_MONTH+1).map((v,i)=>(i===0?'M':'L')+px(i)+','+py(v)).join(' ');
  const budD=c.budLine.slice(CUR_MONTH).map((v,i)=>(i===0?'M':'L')+px(CUR_MONTH+i)+','+py(v)).join(' ');
  let red='';
  for(let i=0;i<lastAct;i++){if((c.monthly[i]||0)>c.budLine[i]||(c.monthly[i+1]||0)>c.budLine[i+1])red+='<polygon points="'+px(i)+','+py(c.monthly[i]||0)+' '+px(i+1)+','+py(c.monthly[i+1]||0)+' '+px(i+1)+','+py(c.budLine[i+1])+' '+px(i)+','+py(c.budLine[i])+'" fill="rgba(224,92,92,.25)"/>';}
  const activeM=actPts.filter(v=>v>0);
  const avg=activeM.length?activeM.reduce((a,b)=>a+b,0)/activeM.length:0;
  const ay=py(avg);
  const avgLine=activeM.length>1?'<line x1="'+pL+'" y1="'+ay+'" x2="'+(W-pR)+'" y2="'+ay+'" stroke="#d4a843" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.8"/>':'';
  const dots=actPts.map((v,i)=>{const cx=px(i).toFixed(1),cy=py(v).toFixed(1);return '<circle cx="'+cx+'" cy="'+cy+'" r="3.5" fill="var(--blue)"/><circle cx="'+cx+'" cy="'+cy+'" r="14" fill="transparent" data-v="'+v.toFixed(0)+'" data-m="'+MONTHS[i]+'" style="cursor:crosshair" onmouseenter="showChartTip(this)" onmouseleave="hideChartTip()"/>';}).join('');
  svg.innerHTML=grid+red+'<path d="'+(budS||'')+'" fill="none" stroke="var(--text3)" stroke-width="1.5"/>'+  '<path d="'+(budD||'')+'" fill="none" stroke="var(--text3)" stroke-width="1.5" stroke-dasharray="5,4"/>'+avgLine+'<path d="'+(actPath||'')+'" fill="none" stroke="var(--blue)" stroke-width="2.5"/>'+dots;
  document.getElementById('ll').innerHTML=MONTHS.map(m=>'<span class="lc-lbl">'+m+'</span>').join('');
  const leg=document.getElementById('chartleg');
  if(leg) leg.innerHTML='<div class="li"><svg width="20" height="10"><line x1="0" y1="5" x2="20" y2="5" stroke="var(--blue)" stroke-width="2"/></svg>Actual</div><div class="li"><svg width="20" height="10"><line x1="0" y1="5" x2="20" y2="5" stroke="var(--text3)" stroke-width="1.5" stroke-dasharray="4,3"/></svg>Budget</div>'+(activeM.length>1?'<div class="li"><svg width="20" height="10"><line x1="0" y1="5" x2="20" y2="5" stroke="#d4a843" stroke-width="1.5" stroke-dasharray="6,4"/></svg>Avg '+fmt(avg)+'/mo</div>':'')+'<div class="li"><div class="ld" style="background:rgba(224,92,92,.3)"></div>Over budget</div>';
  const lm=document.getElementById('lm');
  if(lm) lm.textContent=filterLabel?'Showing: "'+filterLabel+'" · '+fmt(c.spent)+' total':fmt(c.spent)+' of '+fmt(c.annBud)+' annual budget';
}
function showChartTip(el){
  let t=document.getElementById('chart-tip');
  if(!t){t=document.createElement('div');t.id='chart-tip';t.style.cssText='position:fixed;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-size:11px;pointer-events:none;z-index:999;box-shadow:0 4px 12px rgba(0,0,0,.3);';document.body.appendChild(t);}
  const r=el.closest('svg').getBoundingClientRect();
  const cx=parseFloat(el.getAttribute('cx')),cy=parseFloat(el.getAttribute('cy'));
  const sx=r.left+cx*(r.width/600),sy=r.top+cy*(r.height/200);
  t.innerHTML='<div style="color:var(--text3);font-size:10px">'+el.dataset.m+'</div><div style="color:var(--text);font-weight:500">$'+parseInt(el.dataset.v).toLocaleString()+'</div>';
  let left=sx+12;if(left+90>window.innerWidth)left=sx-90;
  t.style.left=left+'px';t.style.top=(sy-30)+'px';t.style.display='';
}
function hideChartTip(){const t=document.getElementById('chart-tip');if(t)t.style.display='none';}

function buildCatOpts(selId){
  return '<option value="">— select —</option>'+DATA.categories.map(c=>'<option value="'+c.id+'"'+(c.id===selId?' selected':'')+'>'+c.name+'</option>').join('')+'<option value="__new__">+ New category…</option>';
}

function renderTxList(){
  const notice=document.getElementById('txNotice'),body=document.getElementById('txBody');
  if(!notice||!body) return;
  let txs=DATA.transactions.filter(t=>{
    if(t.year!==YEAR) return false;
    if(!_txAllYear&&t.month!==_txMonth) return false;
    return t.accountType===_txAcct;
  });
  const uncatCount=txs.filter(t=>!t.categoryId&&!t.isTransfer&&!t.isBusiness).length;
  const acctName=_txAcct==='visa'?(DATA.settings?.accountNames?.visa||'RBC Credit Card'):(DATA.settings?.accountNames?.chequing||'RBC Chequing');
  const period=_txAllYear?String(YEAR):MONTHS[_txMonth-1]+' '+YEAR;
  notice.innerHTML=uncatCount&&!_txKeyword?'<div class="notice" style="margin-bottom:10px"><span>⚠</span><span>'+uncatCount+' transaction'+(uncatCount!==1?'s':'')+' need categorisation</span><button class="btn btn-sm" style="margin-left:auto" onclick="_showUncatOnly=!_showUncatOnly;renderTxList()">'+(_showUncatOnly?'Show all':'Show uncategorised')+'</button></div>':'';
  if(_showUncatOnly) txs=txs.filter(t=>!t.categoryId&&!t.isTransfer&&!t.isBusiness);
  if(_txCatFilter)   txs=txs.filter(t=>t.categoryId===_txCatFilter);
  if(_txKeyword)     txs=txs.filter(t=>t.description.toUpperCase().includes(_txKeyword.toUpperCase()));
  const totalIn=txs.filter(t=>t.amount>0).reduce((s,t)=>s+t.amount,0);
  const totalOut=txs.filter(t=>t.amount<0).reduce((s,t)=>s+Math.abs(t.amount),0);
  const net=totalIn-totalOut;
  const catSpend=_txCatFilter?txs.filter(t=>t.amount<0).reduce((s,t)=>s+Math.abs(t.amount),0):0;
  const catNm=_txCatFilter?(DATA.categories.find(c=>c.id===_txCatFilter)?.name||''):'';
  const netStr=net>=0?fmt(net):'('+fmt(Math.abs(net))+')';
  const netCol=net<0?'var(--red)':'var(--green)';
  let rows='';
  if(txs.length){
    txs.sort((a,b)=>a.date.localeCompare(b.date)).forEach(tx=>{
      const wd=tx.amount<0,amt=wd?'('+fmt(Math.abs(tx.amount))+')':fmt(tx.amount);
      const dim=tx.categoryId&&!tx.isBusiness&&!tx.isTransfer?'dim':'';
      const hl=!tx.categoryId&&!tx.isTransfer&&!tx.isBusiness?'hl':'';
      const catSel=buildCatOpts(tx.categoryId||'');
      const splitBadge=tx.splitMonths>1?'<span class="badge" style="background:rgba(136,119,204,.15);color:var(--purple)">÷'+tx.splitMonths+'</span>':'';
      rows+='<div class="tx-row '+dim+' '+hl+'">'
        +'<div class="tdate">'+tx.date.slice(5).replace('-','/')+'</div>'
        +'<div class="tdesc">'+tx.description+(tx.isTransfer?'<span class="badge bb">Transfer</span>':'')+(hl?'<span class="badge by">Review</span>':'')+splitBadge+'</div>'
        +'<div class="tamt '+(wd?'wd':'dep')+'">'+amt+'</div>'
        +'<div><select class="tsel" onchange="updateTxCat(\''+tx.id+'\',this.value)">'+catSel+'</select></div>'
        +'<div style="display:flex;flex-direction:column;gap:4px">'
        +'<label class="tflag"><input type="checkbox" '+(tx.isBusiness?'checked':'')+' onchange="updateTxBiz(\''+tx.id+'\',this.checked)"> Business</label>'
        +'<label class="tflag" style="accent-color:var(--purple)"><input type="checkbox" '+(tx.isTransfer?'checked':'')+' onchange="updateTxTransfer(\''+tx.id+'\',this.checked)"> Transfer</label>'
        +'<button class="btn btn-sm" style="font-size:9px;padding:2px 6px" onclick="splitInstalment(\''+tx.id+'\')">'+( tx.splitMonths>1?'÷'+tx.splitMonths+' mo':'Split')+'</button>'
        +'</div></div>';
    });
  } else {
    rows='<div class="empty" style="padding:32px"><h3>No transactions</h3><p>'+(_txKeyword?'No results for "'+_txKeyword+'"':'Import a CSV for '+period+'.')+'</p></div>';
  }
  const stats='<div style="font-size:11px;color:var(--text3);margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--border);display:flex;flex-wrap:wrap;gap:10px;align-items:center">'
    +'<span>'+acctName+' — '+period+'</span>'
    +'<span>'+txs.length+' transactions</span>'
    +(_txKeyword?'<span style="color:var(--yellow)">🔍 "'+_txKeyword+'"</span>':'')
    +'<span>In: <span style="color:var(--green)">'+fmt(totalIn)+'</span></span>'
    +'<span>Out: <span style="color:var(--red)">('+fmt(totalOut)+')</span></span>'
    +'<span>Net: <span style="color:'+netCol+'">'+netStr+'</span></span>'
    +(catNm?'<span>'+catNm+': <span style="color:var(--red)">('+fmt(catSpend)+')</span></span>':'')
    +'</div>';
  body.innerHTML=stats+'<div class="tx-hd"><div>Date</div><div>Description</div><div style="text-align:right">Amount</div><div>Category</div><div>Flags</div></div>'+rows;
}

function triggerCSV(){document.getElementById('csvIn').click();}
function triggerJSON(){document.getElementById('jsonIn').click();}

function handleCSV(input){
  const file=input.files[0];if(!file) return;
  const r=new FileReader();
  r.onload=e=>{importCSV_client(e.target.result,file.name);};
  r.readAsText(file);input.value='';
}
function handleJSON(input){
  const file=input.files[0];if(!file) return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const b=JSON.parse(e.target.result);
      if(!b.version) throw new Error('Invalid backup file');
      if(!b.exportedAt) b.exportedAt=new Date().toISOString();
      DATA=b;saveToStorage();
      refreshYears();renderAll();
      toast('✓ Backup loaded');
    }catch(er){alert('Invalid backup: '+er.message);}
  };
  r.readAsText(file);input.value='';
}

async function commitImport(year,month){
  const btn=document.querySelector('.modal-box .btn-p');if(btn){btn.textContent='Importing…';btn.disabled=true;}
  try{
    const toSend=window._importTxs.filter(t=>!t.isDuplicate);
    if(!toSend.length){alert('No transactions to import.');closeModal();return;}
    const res=await api('POST','/api/transactions',{transactions:toSend});
    if(!res||typeof res.added==='undefined') throw new Error('Unexpected response');
    await refreshYears();closeModal();renderAll();
    toast('✓ '+res.added+' transactions imported');
  }catch(e){console.error(e);alert('Import failed: '+e.message);if(btn){btn.textContent='Import';btn.disabled=false;}}
}

function exportBackup(silent=false){
  if(!DATA) return;
  const out={...DATA,exportedAt:new Date().toISOString()};
  // Update exportedAt in live DATA too so freshness badge refreshes
  DATA.exportedAt=out.exportedAt;
  saveToStorage();
  const dateStr=new Date().toISOString().slice(0,10);
  const blob=new Blob([JSON.stringify(out,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=dateStr+'_finances-backup.json';
  document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(url);a.remove();},1000);
  if(silent){toast('✓ Weekly backup saved — move to iCloud Drive');}
  else{renderTransactions();} // refresh freshness badge
}

const CURRENCIES={CAD:'C$',USD:'$',GBP:'£',DKK:'kr',EUR:'€'};
function fmtCcy(n,ccy){
  if(n===0||n==null) return '—';
  const sym=CURRENCIES[ccy]||ccy||'$';
  return sym+Math.abs(n).toLocaleString('en-CA',{minimumFractionDigits:0,maximumFractionDigits:0});
}
let _fxRates=null;
async function getFxRates(){
  if(_fxRates) return _fxRates;
  try{
    const r=await fetch('https://open.er-api.com/v6/latest/USD');
    if(!r.ok) throw new Error('FX failed');
    const d=await r.json();
    _fxRates={USD:1,CAD:d.rates.CAD,GBP:d.rates.GBP,DKK:d.rates.DKK,EUR:d.rates.EUR};
  }catch(e){
    _fxRates={USD:1,CAD:1.36,GBP:0.79,DKK:6.89,EUR:0.92};
  }
  return _fxRates;
}
function toUSD(amount,ccy,rates){
  if(!amount) return 0;
  if(ccy==='USD'||!ccy) return amount;
  const rate=rates[ccy];
  return rate?amount/rate:amount;
}

  if(!allMonths) allMonths=MONTHS.map((m,i)=>({label:m,idx:i,isCur:YEAR===new Date().getFullYear()&&i===CUR_MONTH}));
  if(!grouped){grouped={};DATA.keyAreas.forEach(k=>{grouped[k]=DATA.categories.filter(c=>c.keyArea===k);});}
  const INCOME_KAS=['Incoming'];
  const grandIncBud=new Array(12).fill(0),grandIncAct=new Array(12).fill(0);
  const grandExpBud=new Array(12).fill(0),grandExpAct=new Array(12).fill(0);
  const ytdMCount=allMonths.filter(m=>m.idx<=CUR_MONTH&&YEAR===new Date().getFullYear()).length||allMonths.length;
  let rows='';

  DATA.keyAreas.forEach(ka=>{
    const cats=grouped[ka]||[];if(!cats.length) return;
    const isIncome=INCOME_KAS.includes(ka);
    rows+='<tr class="bsec"><td colspan="'+(allMonths.length+2)+'">'+ka+'</td></tr>';
    const kaBud=new Array(12).fill(0),kaAct=new Array(12).fill(0);

    cats.forEach(cat=>{
      const spent=monthlySpend(cat.id,YEAR);
      const isCurrentYear=YEAR===new Date().getFullYear();
      const hasCurrentMonthActuals=isCurrentYear&&(spent[CUR_MONTH]||0)>0;
      const cutoff=isCurrentYear?(hasCurrentMonthActuals?CUR_MONTH+1:CUR_MONTH):12;
      const periodSpent=spent.slice(0,cutoff).reduce((a,b)=>a+b,0);
      let periodBud=0;for(let m=1;m<=cutoff;m++)periodBud+=budgetFor(cat.id,m,YEAR);
      let sdHtml='';
      if(periodBud>0&&periodSpent>0){
        const sd=periodBud-periodSpent;
        sdHtml=sd>=0?'<span class="bsur">+'+fmt(sd)+'</span>':'<span class="bov">–'+fmt(Math.abs(sd))+'</span>';
      }
      const isBuf=ka==='Buffer / Contingency';
      const getBufferSign=mi=>{const key=YEAR+'-'+String(mi+1).padStart(2,'0');return((DATA.settings&&DATA.settings.bufferSigns)||{})[key]||1;};
      let catRow='<tr>';
      if(isBuf){
        catRow+='<td style="cursor:default">'+cat.name;
        if(periodBud>0||periodSpent>0) catRow+='<span style="margin-left:8px;font-size:10px;font-variant-numeric:tabular-nums;color:'+(periodSpent>=periodBud?'var(--green)':'var(--red)')+'">'+fmt(periodBud)+'</span>';
        catRow+='</td><td style="text-align:right;padding:4px 8px;font-size:10px">'+sdHtml+'</td>';
      } else {
        catRow+='<td style="cursor:pointer" onclick="editCategory(\''+cat.id+'\')" title="Edit">'+cat.name+'</td>';
        catRow+='<td style="text-align:right;padding:4px 8px;font-size:10px">'+sdHtml+'</td>';
      }
      allMonths.forEach(m=>{
        const bud=budgetFor(cat.id,m.idx+1,YEAR);
        const act=spent[m.idx]||0;
        kaBud[m.idx]+=bud;kaAct[m.idx]+=act;
        if(isIncome){grandIncBud[m.idx]+=bud;grandIncAct[m.idx]+=act;}
        else{grandExpBud[m.idx]+=bud;grandExpAct[m.idx]+=act;}
        const over=isIncome?(bud>0&&act>0&&act<bud):(act>0&&bud>0&&act>bud);
        const same=act>0&&bud>0&&Math.abs(act-bud)<0.5;
        if(isBuf){
          const sign=getBufferSign(m.idx);
          const budCol=sign>=0?'var(--green)':'var(--red)';
          const budPrefix=sign>=0?'+':'–';
          catRow+='<td class="'+(m.isCur?'bcur':'')+'">'
            +(bud>0?'<div class="bb-val" style="color:'+budCol+'">'+budPrefix+fmt(bud)+'</div>':'<div class="bb-val">—</div>')
            +(act?'<div class="ba-val '+(over?'bov':'')+'">'+fmt(act)+'</div>':'')
            +'</td>';
        } else {
          catRow+='<td class="editable '+(m.isCur?'bcur':'')+'\"'
            +' onclick="inlineEdit(this,\''+cat.id+'\',\''+ka+'\','+m.idx+','+YEAR+')">'
            +'<div class="bb-val">'+(bud?fmt(bud):'—')+'</div>'
            +(act?'<div class="ba-val '+(same?'':over?'bov':'')+'">'+fmt(act)+'</div>':'')
            +(m.isCur&&act>0?'<span class="btx-expand" onclick="event.stopPropagation();toggleBudTxDetail(this,\''+cat.id+'\','+m.idx+')">↓ details</span>':'')
            +'</td>';
        }
      });
      catRow+='</tr>';rows+=catRow;
      rows+='<tr id="btx-'+cat.id+'" style="display:none" class="btx-detail"><td colspan="'+(allMonths.length+2)+'"><div id="btxc-'+cat.id+'"></div></td></tr>';
    });

    let totRow='<tr class="btot"><td>'+ka+' Total</td><td></td>';
    allMonths.forEach(m=>{
      const b=kaBud[m.idx],a=kaAct[m.idx];
      const ov=isIncome?(b>0&&a>0&&a<b):(a>0&&b>0&&a>b);
      totRow+='<td class="'+(m.isCur?'bcur':'')+'"><div class="bb-val">'+fmt(b)+'</div>'+(a?'<div class="ba-val '+(ov?'bov':'')+'">'+fmt(a)+'</div>':'')+'</td>';
    });
    totRow+='</tr>';rows+=totRow;
  });

  const trfCatIds=DATA.categories.filter(c=>c.name==='International Transfer').map(c=>c.id);
  const bufSigns=(DATA.settings&&DATA.settings.bufferSigns)||{};
  let incRow='<tr class="btot" style="border-top:2px solid var(--border)"><td>TOTAL INCOMING</td><td></td>';
  let expRow='<tr class="btot"><td>TOTAL OUTGOING</td><td></td>';
  let netRow='<tr class="btot" style="border-top:1px solid var(--border)"><td style="font-weight:700">NET</td><td></td>';
  let netNoTrfRow='<tr class="btot"><td style="color:var(--text3);font-size:10px">NET (excl. intl transfers)</td><td></td>';

  allMonths.forEach(m=>{
    const ib=grandIncBud[m.idx],ia=grandIncAct[m.idx];
    const eb=grandExpBud[m.idx],ea=grandExpAct[m.idx];
    const net=(ia||ib)-(ea||eb);
    const trfAct=trfCatIds.reduce((s,id)=>s+monthlySpend(id,YEAR)[m.idx],0);
    const netNoTrf=(ia||ib)-trfAct-(ea||eb);
    const monthKey=YEAR+'-'+String(m.idx+1).padStart(2,'0');
    const bufSign=bufSigns[monthKey];
    const surplusAbsorbed=bufSign===1;
    const netBudDisplay=surplusAbsorbed&&net===0
      ?'<div class="bb-val" style="color:var(--text3)">—</div>'
      :'<div class="bb-val '+(net<0?'bov':net>0?'bsur':'')+'">'+( net<0?'–':'')+fmt(Math.abs(net))+'</div>';
    const netNoTrfDisplay=surplusAbsorbed&&netNoTrf===0
      ?'<div style="font-size:10px;color:var(--text3)">—</div>'
      :'<div style="font-size:10px;color:'+(netNoTrf<0?'var(--red)':netNoTrf>0?'var(--green)':'var(--text3)')+'">'+( netNoTrf<0?'–':'')+fmt(Math.abs(netNoTrf))+'</div>';
    incRow+='<td class="'+(m.isCur?'bcur':'')+'"><div class="bb-val">'+fmt(ib)+'</div>'+(ia?'<div class="ba-val bsur">'+fmt(ia)+'</div>':'')+'</td>';
    expRow+='<td class="'+(m.isCur?'bcur':'')+'"><div class="bb-val">'+fmt(eb)+'</div>'+(ea?'<div class="ba-val '+(ea>eb?'bov':'')+'">'+fmt(ea)+'</div>':'')+'</td>';
    netRow+='<td class="'+(m.isCur?'bcur':'')+'">'+netBudDisplay+'</td>';
    netNoTrfRow+='<td class="'+(m.isCur?'bcur':'')+'">'+netNoTrfDisplay+'</td>';
  });
  incRow+='</tr>';expRow+='</tr>';netRow+='</tr>';netNoTrfRow+='</tr>';

  const actNetArr=allMonths.map(m=>(grandIncAct[m.idx]||grandIncBud[m.idx])-(grandExpAct[m.idx]||grandExpBud[m.idx]));
  const avgNet=actNetArr.reduce((a,b)=>a+b,0)/Math.max(ytdMCount,1);
  const avgRow='<tr class="btot"><td colspan="2" style="font-size:10px;color:var(--text3)">Monthly avg ('+ytdMCount+' month'+(ytdMCount!==1?'s':'')+')</td>'
    +allMonths.map(()=>'<td></td>').join('')
    +'</tr><tr class="btot"><td colspan="2" style="font-size:11px">Net avg: <span style="color:'+(avgNet<0?'var(--red)':'var(--green)')+'">'+fmt(Math.abs(avgNet))+'</span></td>'
    +allMonths.map(()=>'<td></td>').join('')+'</tr>';

  rows+=incRow+expRow+netRow+netNoTrfRow+avgRow;
  body.innerHTML=rows;
  renderBudgetCards();
}

function renderBudgetCards(){
  const el=document.getElementById('bcardList');if(!el)return;
  const m=CUR_MONTH; // always current month on mobile
  let html='';
  let grandIncBud=0,grandIncAct=0,grandExpBud=0,grandExpAct=0;
  DATA.keyAreas.forEach(ka=>{
    const cats=DATA.categories.filter(c=>c.keyArea===ka);if(!cats.length)return;
    const isIncome=ka==='Incoming';
    html+='<div class="bcard-section">'+ka+'</div>';
    cats.forEach(cat=>{
      const bud=budgetFor(cat.id,m+1,YEAR);
      const act=monthlySpend(cat.id,YEAR)[m]||0;
      if(!bud&&!act) return;
      if(isIncome){grandIncBud+=bud;grandIncAct+=act;}
      else{grandExpBud+=bud;grandExpAct+=act;}
      const over=!isIncome&&act>0&&bud>0&&act>bud;
      const actCol=over?'var(--red)':'var(--text)';
      html+='<div class="bcard-row">'
        +'<div class="bcard-name">'+cat.name+'</div>'
        +'<div class="bcard-vals">'
        +(bud?'<div class="bcard-bud">Budget: '+fmt(bud)+'</div>':'')
        +(act?'<div class="bcard-act" style="color:'+actCol+'">'+fmt(act)+'</div>':'<div class="bcard-act" style="color:var(--text3)">—</div>')
        +'</div></div>';
    });
  });
  // Totals
  const net=(grandIncAct||grandIncBud)-(grandExpAct||grandExpBud);
  const netCol=net<0?'var(--red)':'var(--green)';
  html+='<div style="margin-top:12px">'
    +'<div class="bcard-tot"><span class="bcard-tot-label">Total Income</span><span class="bcard-tot-val" style="color:var(--green)">'+fmt(grandIncAct||grandIncBud)+'</span></div>'
    +'<div class="bcard-tot" style="margin-top:6px"><span class="bcard-tot-label">Total Outgoing</span><span class="bcard-tot-val" style="color:var(--red)">'+fmt(grandExpAct||grandExpBud)+'</span></div>'
    +'<div class="bcard-tot" style="margin-top:6px;border:1px solid '+(net<0?'rgba(224,92,92,.3)':'rgba(21,189,236,.3)')+'"><span class="bcard-tot-label">Net '+MONTHS[m]+'</span><span class="bcard-tot-val" style="color:'+netCol+'">'+(net>=0?'':'-')+fmt(Math.abs(net))+'</span></div>'
    +'</div>';
  el.innerHTML=html;
}

function toggleBudTxDetail(btn,catId,monthIdx){
  const row=document.getElementById('btx-'+catId);
  const content=document.getElementById('btxc-'+catId);
  if(row.style.display!=='none'){row.style.display='none';btn.textContent='↓ details';return;}
  row.style.display='';btn.textContent='↑ hide';

  // Direct transactions in this month
  const directTxs=DATA.transactions.filter(t=>
    t.categoryId===catId&&t.year===YEAR&&t.month===monthIdx+1&&
    !t.isBusiness&&!t.isTransfer&&!(t.splitMonths>1)
  ).sort((a,b)=>a.date.localeCompare(b.date));

  // Split transactions whose spread covers this month (but didn't originate here)
  const splitTxs=DATA.transactions.filter(t=>{
    if(t.categoryId!==catId||!t.splitMonths||t.splitMonths<=1||t.isBusiness||t.isTransfer) return false;
    const originOffset=(t.year-YEAR)*12+(t.month-1);
    const endOffset=originOffset+t.splitMonths-1;
    return monthIdx>=originOffset&&monthIdx<=endOffset;
  }).sort((a,b)=>a.date.localeCompare(b.date));

  if(!directTxs.length&&!splitTxs.length){
    content.innerHTML='<div style="font-size:11px;color:var(--text3)">No transactions for '+MONTHS[monthIdx]+'.</div>';
    return;
  }

  const header='<div style="font-size:10px;color:var(--text3);margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:.08em">'+MONTHS[monthIdx]+' '+YEAR+' transactions</div>'
    +'<div style="display:grid;grid-template-columns:60px 1fr 80px 60px;gap:6px;font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;padding:0 0 4px;border-bottom:1px solid var(--border);margin-bottom:4px">'
    +'<div>Date</div><div>Description</div><div style="text-align:right">Amount</div><div style="text-align:right">This mo.</div></div>';

  const directRows=directTxs.map(tx=>{
    const wd=tx.amount<0,amt=wd?'('+fmt(Math.abs(tx.amount))+')':fmt(tx.amount);
    return '<div style="display:grid;grid-template-columns:60px 1fr 80px 60px;gap:6px;padding:4px 0;border-bottom:1px solid var(--border);font-size:11px">'
      +'<div style="color:var(--text3)">'+tx.date.slice(5).replace('-','/')+'</div>'
      +'<div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+tx.description+'">'+tx.description.slice(0,38)+'</div>'
      +'<div style="text-align:right;color:'+(wd?'var(--text2)':'var(--green)')+'">'+amt+'</div>'
      +'<div></div>'
      +'</div>';
  }).join('');

  const splitRows=splitTxs.length
    ?'<div style="font-size:9px;font-weight:600;color:var(--blue);text-transform:uppercase;letter-spacing:.08em;margin:6px 0 4px">Instalment splits</div>'
      +splitTxs.map(tx=>{
        const total=Math.abs(tx.amount);
        const perMonth=total/tx.splitMonths;
        const originMonth=MONTHS[tx.month-1];
        const originYear=tx.year;
        return '<div style="display:grid;grid-template-columns:60px 1fr 80px 60px;gap:6px;padding:4px 0;border-bottom:1px solid var(--border);font-size:11px;color:var(--blue)">'
          +'<div style="color:var(--text3)">'+tx.date.slice(5).replace('-','/')+'</div>'
          +'<div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--blue)" title="'+tx.description+' (split '+tx.splitMonths+' months from '+originMonth+' '+originYear+')">'+tx.description.slice(0,30)+' <span style="font-size:9px;opacity:.8">÷'+tx.splitMonths+'mo</span></div>'
          +'<div style="text-align:right;color:var(--text3)">('+fmt(total)+')</div>'
          +'<div style="text-align:right;color:var(--blue);font-weight:500">('+fmt(perMonth)+')</div>'
          +'</div>';
      }).join('')
    :'';

  content.innerHTML=header+directRows+splitRows;
}

let _budCollapsed=false;

  document.getElementById('bcBtn').textContent=_budCollapsed?'Show all 12 months':'Collapse to 3 months';

  const show=_budCollapsed
    ?(isMobile?all.filter(m=>m.idx===CUR_MONTH):all.filter(m=>[CUR_MONTH-1,CUR_MONTH,CUR_MONTH+1].includes(m.idx)))
    :all;
  all.forEach(m=>{const th=document.getElementById('bth-'+m.idx);if(th)th.style.display=show.find(s=>s.idx===m.idx)?'':'none';});
  renderBudgetBody(show,null);
}

async function balanceBuffer(){
  const bufCat=DATA.categories.find(c=>c.keyArea==='Buffer / Contingency');
  if(!bufCat){alert('No Buffer / Contingency category found.');return;}
  const isCurrentYear=YEAR===new Date().getFullYear();
  const startMonth=isCurrentYear?CUR_MONTH+1:1;
  const incomeCatsNoTrf=DATA.categories.filter(c=>c.keyArea==='Incoming'&&c.name!=='International Transfer');
  const expCats=DATA.categories.filter(c=>c.keyArea!=='Incoming'&&c.id!==bufCat.id);
  const monthlyNets={};
  for(let m=startMonth;m<=12;m++){
    const incBud=incomeCatsNoTrf.reduce((s,c)=>s+budgetFor(c.id,m,YEAR),0);
    const expBud=expCats.reduce((s,c)=>s+budgetFor(c.id,m,YEAR),0);
    monthlyNets[m]=incBud-expBud;
  }
  const previewLines=Object.entries(monthlyNets)
    .map(([m,n])=>MONTHS[+m-1]+': '+(n>0?'surplus +':n<0?'deficit ':'zero ')+fmt(Math.abs(n))+(n>0?' → buffer absorbs':(n<0?' → buffer draws down':'')))
    .join('\n');
  if(!confirm('Balance Buffer/Contingency for '+MONTHS[startMonth-1]+' – Dec '+YEAR+':\n\n'+previewLines+'\n\nPast months are unchanged. Continue?')) return;
  const toDelete=DATA.budgets.filter(b=>b.categoryId===bufCat.id&&b.frequency==='individual'&&b.startYear===YEAR&&b.startMonth>=startMonth);
  for(const b of toDelete) await api('DELETE','/api/budgets/'+b.id);
  DATA.budgets=DATA.budgets.filter(b=>!toDelete.find(d=>d.id===b.id));
  const nonInd=DATA.budgets.filter(b=>b.categoryId===bufCat.id&&b.frequency!=='individual');
  for(const b of nonInd) await api('DELETE','/api/budgets/'+b.id);
  DATA.budgets=DATA.budgets.filter(b=>!nonInd.find(d=>d.id===b.id));
  if(!DATA.settings.bufferSigns) DATA.settings.bufferSigns={};
  for(let m=startMonth;m<=12;m++){
    const key=YEAR+'-'+String(m).padStart(2,'0');
    DATA.settings.bufferSigns[key]=monthlyNets[m]>=0?1:-1;
  }
  await api('PUT','/api/settings',DATA.settings);
  for(let m=startMonth;m<=12;m++){
    const val=monthlyNets[m];
    if(val!==0){
      await api('POST','/api/budgets',{categoryId:bufCat.id,amount:Math.abs(val),frequency:'individual',startMonth:m,startYear:YEAR});
    }
  }
  renderBudgetBody(null,null);
}

function inlineEdit(cell,catId,ka,monthIdx,year){
  if(cell.querySelector('.cell-input')) return;
  const curBud=budgetFor(catId,monthIdx+1,year);
  const origHTML=cell.innerHTML;
  cell.innerHTML='<input class="cell-input" id="ei-bud" type="number" value="'+(curBud||'')+'" placeholder="Budget">';
  const inp=cell.querySelector('#ei-bud');inp.focus();inp.select();
  let committed=false;
  const commit=async()=>{
    if(committed) return;committed=true;
    const newBud=parseFloat(inp.value)||0;
    if(newBud===curBud){renderBudgetBody(null,null);return;}
    const snapshot={};
    for(let m=1;m<=12;m++) snapshot[m]=budgetFor(catId,m,year);
    snapshot[monthIdx+1]=newBud;
    const existing=DATA.budgets.filter(b=>b.categoryId===catId);
    for(const b of existing) await api('DELETE','/api/budgets/'+b.id);
    DATA.budgets=DATA.budgets.filter(b=>b.categoryId!==catId);
    for(let m=1;m<=12;m++){
      if(snapshot[m]>0){
        await api('POST','/api/budgets',{categoryId:catId,amount:snapshot[m],frequency:'individual',startMonth:m,startYear:year});
      }
    }
    renderBudgetBody(null,null);
  };
  inp.addEventListener('blur',()=>setTimeout(commit,150));
  inp.addEventListener('keydown',e=>{
    if(e.key==='Enter'){e.preventDefault();commit();}
    if(e.key==='Escape'){committed=true;cell.innerHTML=origHTML;}
  });
}
